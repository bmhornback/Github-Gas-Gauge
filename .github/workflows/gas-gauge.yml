name: GitHub Gas Gauge

on:
  schedule:
    # Run daily at 9am UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      org:
        description: "Organization name (leave blank for personal usage)"
        required: false
        default: ""
      plan:
        description: "Copilot plan (free, pro, business, enterprise)"
        required: false
        default: "pro"
      quota:
        description: "Monthly quota override (leave blank to use plan default)"
        required: false
        default: ""
      section:
        description: "Which section to show: both, copilot-only, actions-only"
        required: false
        default: "both"

jobs:
  gas-gauge:
    name: Check GitHub Usage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GitHub Gas Gauge (personal)
        if: ${{ github.event.inputs.org == '' || github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          COPILOT_PLAN: ${{ github.event.inputs.plan || 'pro' }}
          COPILOT_QUOTA: ${{ github.event.inputs.quota || '' }}
        run: |
          ARGS="--plan ${{ github.event.inputs.plan || 'pro' }}"
          if [ -n "${{ github.event.inputs.quota }}" ]; then
            ARGS="$ARGS --quota ${{ github.event.inputs.quota }}"
          fi
          if [ "${{ github.event.inputs.section }}" = "copilot-only" ]; then
            ARGS="$ARGS --copilot-only"
          elif [ "${{ github.event.inputs.section }}" = "actions-only" ]; then
            ARGS="$ARGS --actions-only"
          fi
          python gas_gauge.py $ARGS

      - name: Run GitHub Gas Gauge (organization)
        if: ${{ github.event.inputs.org != '' && github.event_name != 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          COPILOT_PLAN: ${{ github.event.inputs.plan || 'pro' }}
          COPILOT_QUOTA: ${{ github.event.inputs.quota || '' }}
        run: |
          ARGS="--org ${{ github.event.inputs.org }} --plan ${{ github.event.inputs.plan || 'pro' }}"
          if [ -n "${{ github.event.inputs.quota }}" ]; then
            ARGS="$ARGS --quota ${{ github.event.inputs.quota }}"
          fi
          if [ "${{ github.event.inputs.section }}" = "copilot-only" ]; then
            ARGS="$ARGS --copilot-only"
          elif [ "${{ github.event.inputs.section }}" = "actions-only" ]; then
            ARGS="$ARGS --actions-only"
          fi
          python gas_gauge.py $ARGS
